apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      # How often Prometheus pulls metrics from each target.
      # Every 15s it hits /actuator/prometheus on your Spring Boot pods.

    scrape_configs:
      - job_name: hello-api
        # Job name appears as a label on every metric in Grafana.
        metrics_path: /actuator/prometheus
        # The endpoint Spring Boot exposes metrics on (enabled in application.yml).
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [hello-api]
            # Kubernetes service discovery — Prometheus automatically finds
            # all pods in the hello-api namespace without hardcoding IPs.
            # Pod IPs change on every restart; this handles that automatically.
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: hello-api
            # Only scrape pods labelled app=hello-api.
            # Prevents Prometheus scraping unrelated pods in the namespace.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
  # Prometheus needs a ServiceAccount to use Kubernetes service discovery.
  # Without this it cannot list pods across namespaces.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, pods, services, endpoints]
    verbs: [get, list, watch]
  # Grants Prometheus read-only access to discover pods and services.
  # get/list/watch — read only, no ability to modify anything.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
  # Binds the ClusterRole to the prometheus ServiceAccount.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=7d
            # Keeps 7 days of metric history.
            # Increase this if you want longer history (uses more disk).
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
      # Access Prometheus UI at http://localhost:30090
      # Useful for debugging — you can run raw PromQL queries here.
