apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        isDefault: true
        # isDefault: true — Grafana uses Prometheus as the default data source.
        # http://prometheus:9090 — internal Kubernetes DNS name for the Prometheus service.

      - name: Loki
        type: loki
        url: http://loki:3100
        # Loki data source for log queries.
        # In Grafana Explore tab you can query logs with LogQL.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: monitoring
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: default
        type: file
        options:
          path: /var/lib/grafana/dashboards
          # Grafana auto-loads any JSON dashboard files from this folder.
          # The hello-api dashboard below is provisioned automatically on startup.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-hello-api
  namespace: monitoring
data:
  hello-api.json: |
    {
      "title": "Hello API",
      "uid": "hello-api",
      "panels": [
        {
          "title": "HTTP Request Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [{
            "expr": "rate(http_server_requests_seconds_count{application=\"hello-api\"}[1m])",
            "legendFormat": "{{method}} {{uri}} {{status}}"
          }]
        },
        {
          "title": "HTTP Response Time (p99)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [{
            "expr": "histogram_quantile(0.99, rate(http_server_requests_seconds_bucket{application=\"hello-api\"}[1m]))",
            "legendFormat": "p99 {{uri}}"
          }]
        },
        {
          "title": "JVM Memory Used",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [{
            "expr": "jvm_memory_used_bytes{application=\"hello-api\"}",
            "legendFormat": "{{area}} {{id}}"
          }]
        },
        {
          "title": "Application Logs",
          "type": "logs",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{
            "expr": "{namespace=\"hello-api\", app=\"hello-api\"}",
            "legendFormat": ""
          }]
        }
      ],
      "time": {"from": "now-1h", "to": "now"},
      "refresh": "10s"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
              # Default password: admin / admin
              # Change this for any shared or production environment.
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
              # Allows viewing dashboards without login — convenient for local dev.
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-hello-api
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: dashboard-hello-api
          configMap:
            name: grafana-dashboard-hello-api
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
      # Access Grafana at http://localhost:30030
      # Login: admin / admin
