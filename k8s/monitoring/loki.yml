apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
data:
  loki.yml: |
    auth_enabled: false
    # auth_enabled: false — no login required for Loki itself.
    # Grafana handles authentication for the dashboard.

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v12
          index:
            prefix: index_
            period: 24h

    limits_config:
      retention_period: 168h
      # Keeps 7 days (168 hours) of logs.
    analytics:
      reporting_enabled: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "mkdir -p /loki/wal && chmod -R 777 /loki"]
          # Creates the /wal directory Loki needs and sets write permissions.
          # Runs once before the Loki container starts.
          volumeMounts:
            - name: storage
              mountPath: /loki
      containers:
        - name: loki
          image: grafana/loki:2.9.4
          args: [-config.file=/etc/loki/loki.yml]
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: storage
              mountPath: /loki
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: storage
          emptyDir: {}
          # emptyDir: logs are stored in pod memory/disk.
          # Lost when pod restarts — fine for local dev, use PersistentVolume for prod.
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: monitoring
spec:
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100
      # Internal only — Promtail and Grafana reach Loki via this service.
      # No NodePort needed as it is not accessed directly from your laptop.
