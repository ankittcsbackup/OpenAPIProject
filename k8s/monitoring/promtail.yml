apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yml: |
    server:
      http_listen_port: 9080

    clients:
      - url: http://loki:3100/loki/api/v1/push
        # Sends collected logs to Loki's push API inside the cluster.

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        # Promtail uses Kubernetes service discovery to find all pods.
        # It automatically starts collecting logs from every new pod.
        pipeline_stages:
          - docker: {}
          # Parses Docker log format (adds timestamp, stream, log fields).
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Adds app, namespace, pod labels to every log line.
          # In Grafana you can filter logs by: namespace=hello-api, app=hello-api.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: [nodes, pods, namespaces]
    verbs: [get, list, watch]
  # Promtail needs to list pods to discover their log file paths on the node.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: monitoring
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
  # DaemonSet: runs exactly one Promtail pod on every node in the cluster.
  # On Docker Desktop there is one node, so one Promtail pod runs.
  # On a 10-node cluster, 10 Promtail pods run — one per node.
  # This ensures logs from every pod on every node are collected.
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:2.9.4
          args: [-config.file=/etc/promtail/promtail.yml]
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
              # Mounts the node's container log directory into the Promtail pod.
              # This is how Promtail reads logs from all other containers on the node.
              # readOnly: true — Promtail only reads logs, never writes.
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
