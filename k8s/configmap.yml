apiVersion: v1
kind: ConfigMap
# ConfigMap stores plain (non-sensitive) configuration your app needs at runtime.
# Think of it as environment variables stored in Kubernetes rather than hardcoded in the image.
# This means you can change config without rebuilding the Docker image.
metadata:
  name: hello-api-config
  namespace: hello-api
data:
  SERVER_PORT: "8080"
  SPRING_PROFILES_ACTIVE: "default"
